  :root {

    --text:         #0a0a09;
    --text-muted:   #111110;
    --text-dim:     #5a5850;
    --accent:       #16a34a;
    --accent-blue:  #2970d6;
    --accent-purple:#7c5ce0;
    --accent-orange:#d94f2a;
    --font-sans:    'Barlow', sans-serif;
    --font-cond:    'Barlow Condensed', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --radius:       4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 300;
  }
  #root { display: flex; flex-direction: column; min-height: 100vh; }

  .header {
    height: 56px; padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 20;
  }
  .header-title {
    font-family: var(--font-cond);
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-dim);
  }
  .header-meta {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text-dim);
  }

  .tabs {
    display: flex; gap: 0; padding: 0 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 56px; z-index: 19;
  }
  .tab {
    padding: 10px 18px; font-size: 11px; cursor: pointer; border: none;
    background: none; color: var(--text-dim);
    font-family: var(--font-mono); letter-spacing: 0.06em;
    border-bottom: 2px solid transparent; text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }
  .panel { padding: 28px 24px; }

  /* Concept Grid */
  .grid-wrap { overflow-x: auto; }
  table.concept-grid { border-collapse: collapse; width: 100%; }
  table.concept-grid th {
    text-align: left; padding: 6px 12px;
    font-family: var(--font-mono); font-size: 9px;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  table.concept-grid th.ver { text-align: center; }
  table.concept-grid td {
    padding: 5px 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle;
  }
  table.concept-grid td.concept-id {
    font-family: var(--font-mono); color: var(--text-dim); font-size: 11px; white-space: nowrap;
  }
  .cell-born   { background: rgba(22,163,74,0.09);   color: #16a34a; }
  .cell-stable { background: rgba(90,88,80,0.06);    color: #5a5850; }
  .cell-morphed{ background: rgba(124,92,224,0.09);  color: #7c5ce0; }
  .cell-died   { background: rgba(217,79,42,0.09);   color: #d94f2a; }
  .cell-split  { background: rgba(41,112,214,0.09);  color: #2970d6; }
  .cell-merged { background: rgba(41,112,214,0.09);  color: #2970d6; }
  .cell-absent { background: transparent; color: var(--border); }
  .cell-badge {
    font-family: var(--font-mono);
    font-size: 8px; padding: 1px 5px; border-radius: var(--radius);
    font-weight: 500; letter-spacing: 0.04em; display: inline-block;
  }

  /* Exact language */
  .commit-block { margin-bottom: 24px; }
  .commit-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text-dim); margin-bottom: 8px;
    display: flex; gap: 10px; align-items: center;
  }
  .commit-label .chash { color: var(--accent-blue); }
  .commit-label .era-tag {
    background: var(--bg3); padding: 1px 6px; border-radius: var(--radius);
    font-size: 8px; text-transform: uppercase; border: 1px solid var(--border);
  }
  .commit-label .cmsg { color: var(--text-muted); font-family: var(--font-sans); font-size: 12px; }
  .evidence-block {
    padding: 10px 14px; background: var(--bg2);
    border-left: 3px solid var(--border); margin-bottom: 6px;
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .evidence-block .concept-tag {
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text-dim); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; gap: 8px; align-items: center;
  }
  .ev-add  { color: var(--accent);        font-family: var(--font-mono); font-size: 11px; line-height: 1.7; white-space: pre-wrap; }
  .ev-del  { color: var(--accent-orange); font-family: var(--font-mono); font-size: 11px; line-height: 1.7; white-space: pre-wrap; text-decoration: line-through; }
  .ev-note { color: var(--text-dim);      font-family: var(--font-sans);  font-size: 12px; line-height: 1.6; font-style: italic; }

  /* Sentiment chart */
  .sentiment-wrap { overflow-x: auto; }
  .chart-container { min-width: 500px; }
  .chart-label {
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 10px;
  }
  svg.sentiment-chart { display: block; width: 100%; }

  /* LOC chart */
  .loc-bars { display: flex; flex-direction: column; gap: 10px; max-width: 680px; }
  .loc-row { display: flex; align-items: center; gap: 12px; }
  .loc-label {
    width: 190px;
    font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
    text-align: right; flex-shrink: 0; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .loc-bar-wrap { flex: 1; background: var(--bg3); border-radius: var(--radius); height: 18px; }
  .loc-bar { height: 100%; border-radius: var(--radius); min-width: 2px; transition: width 0.3s; }
  .loc-value {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text-dim); width: 36px; text-align: right;
  }
</style>

const LC_COLOR = { BORN:"#16a34a", STABLE:"#5a5850", MORPHED:"#7c5ce0", SPLIT:"#2970d6", MERGED:"#2970d6", DIED:"#d94f2a" };
const LC_CLASS = { BORN:"cell-born", STABLE:"cell-stable", MORPHED:"cell-morphed", DIED:"cell-died", SPLIT:"cell-split", MERGED:"cell-merged" };

// ─── Concept Grid ────────────────────────────────────────────────────────
function ConceptGrid() {
  const records = CONCEPTS_DATA.records || [];
  const commits = CONCEPTS_DATA.sankey_snapshots || [];
  const conceptIds = CONCEPTS_DATA.concept_ids || [];

  // Build lookup: conceptId → commitHash → record
  const lookup = {};
  for (const r of records) {
    if (!lookup[r.concept_id]) lookup[r.concept_id] = {};
    lookup[r.concept_id][r.commit] = r;
  }

  // Show max 12 commits for readability; always include first and last
  const allHashes = commits.map(c => c.hash);
  const shown = allHashes.length <= 12 ? allHashes : [
    ...allHashes.slice(0, 5),
    "...",
    ...allHashes.slice(-5)
  ].filter(h => h !== "...");

  return (
    <div className="grid-wrap">
      <table className="concept-grid">
        <thead>
          <tr>
            <th>concept</th>
            {commits.filter(c => shown.includes(c.hash)).map(c => (
              <th key={c.hash} className="ver" title={c.message}>
                {c.hash_short}<br/>
                <span style={{fontSize:"9px",color:"#4a5568"}}>{c.date}</span>
              </th>
            ))}
            <th>first seen</th>
            <th>last seen</th>
          </tr>
        </thead>
        <tbody>
          {conceptIds.map(cid => {
            const row = lookup[cid] || {};
            const byCommit = commits.filter(c => shown.includes(c.hash)).map(c => {
              const rec = row[c.hash];
              if (!rec) return { hash: c.hash, state: null };
              return { hash: c.hash, state: rec.lifecycle_state };
            });
            const allCommits = Object.values(row);
            const firstDate = allCommits.map(r => r.date).sort()[0];
            const lastDate  = allCommits.map(r => r.date).sort().reverse()[0];
            return (
              <tr key={cid}>
                <td className="concept-id">{cid}</td>
                {byCommit.map(cell => (
                  <td key={cell.hash} className={cell.state ? LC_CLASS[cell.state]||"cell-stable" : "cell-absent"}>
                    {cell.state && (
                      <span className="cell-badge">{cell.state[0]}</span>
                    )}
                  </td>
                ))}
                <td style={{color:"#4a5568",fontSize:"10px"}}>{firstDate}</td>
                <td style={{color:"#4a5568",fontSize:"10px"}}>{lastDate}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{marginTop:12,fontSize:10,color:"#4a5568"}}>
        B=BORN &nbsp; S=STABLE &nbsp; M=MORPHED &nbsp; D=DIED &nbsp; ↕=SPLIT &nbsp; ∪=MERGED
      </div>
    </div>
  );
}

// ─── Exact Language ──────────────────────────────────────────────────────
function ExactLanguage() {
  const records = (CONCEPTS_DATA.records || []).filter(r => r.evidence && r.lifecycle_state !== "STABLE");
  const snapshots = CONCEPTS_DATA.sankey_snapshots || [];
  const hashToSnap = Object.fromEntries(snapshots.map(s => [s.hash, s]));

  // Group by commit (using full hash key)
  const byCommit = {};
  for (const r of records) {
    if (!byCommit[r.commit]) byCommit[r.commit] = [];
    byCommit[r.commit].push(r);
  }

  const hashes = Object.keys(byCommit).sort((a,b) => {
    const da = hashToSnap[a]?.date || ""; const db = hashToSnap[b]?.date || "";
    return da.localeCompare(db);
  });

  function renderEvidence(ev) {
    if (!ev) return null;
    const lines = ev.split("\n");
    return lines.map((line, i) => {
      if (line.startsWith("+")) return <div key={i} className="ev-add">{line}</div>;
      if (line.startsWith("-")) return <div key={i} className="ev-del">{line}</div>;
      return <div key={i} className="ev-note">{line}</div>;
    });
  }

  return (
    <div>
      {hashes.map(hash => {
        const snap = hashToSnap[hash];
        const recs = byCommit[hash];
        return (
          <div key={hash} className="commit-block">
            <div className="commit-label">
              <span className="hash">{snap?.hash_short || hash.slice(0,7)}</span>
              <span>{snap?.date}</span>
              {snap?.era && <span className="era-tag">{snap.era}</span>}
              <span style={{color:"#c9d1d9"}}>{snap?.message}</span>
            </div>
            {recs.map((r, i) => (
              <div key={i} className="evidence-block">
                <div className="concept-tag">
                  {r.concept_id} &nbsp;→&nbsp;
                  <span style={{color:LC_COLOR[r.lifecycle_state]||"#64748b"}}>{r.lifecycle_state}</span>
                  {r.certainty && <span style={{color:"#4a5568"}}> &nbsp; certainty:{r.certainty} autonomy:{r.autonomy}</span>}
                </div>
                {renderEvidence(r.evidence)}
              </div>
            ))}
          </div>
        );
      })}
      {hashes.length === 0 && <div style={{color:"#4a5568"}}>No evidence quotes available — run Phase 2 with a real repo.</div>}
    </div>
  );
}

// ─── Sentiment Arc ───────────────────────────────────────────────────────
function SentimentArc() {
  const data = SENTIMENT_DATA || [];
  if (!data.length) return <div style={{color:"#4a5568"}}>No sentiment data available.</div>;

  const W = 600, H = 180, padL = 40, padR = 20, padT = 20, padB = 40;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const files = [...new Set(data.map(d => d.file))];
  const colors = ["#2970d6","#16a34a","#7c5ce0","#d94f2a"];

  // For each file, build certainty + autonomy series
  function makePoints(series, key) {
    const vals = series.filter(d => d[key] != null).map(d => d[key]);
    if (!vals.length) return [];
    const xStep = chartW / Math.max(series.length - 1, 1);
    return series.map((d, i) => ({
      x: padL + i * xStep,
      y: padT + chartH - ((d[key] - 1) / 3) * chartH,
      val: d[key],
      date: d.date,
    })).filter(p => p.val != null);
  }

  function toPath(pts) {
    if (pts.length < 2) return "";
    return pts.map((p,i) => `${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  }

  return (
    <div className="sentiment-wrap">
      <div className="chart-container">
        <div className="chart-label">Certainty & Autonomy (1=hedged → 4=imperative)</div>
        <svg className="sentiment-chart" viewBox={`0 0 ${W} ${H}`} style={{height:H}}>
          {/* grid */}
          {[1,2,3,4].map(v => {
            const y = padT + chartH - ((v-1)/3)*chartH;
            return <g key={v}>
              <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#dddbd6" strokeWidth={1}/>
              <text x={padL-6} y={y+4} textAnchor="end" fill="#5a5850" fontSize={9}>{v}</text>
            </g>;
          })}

          {files.map((file, fi) => {
            const series = data.filter(d => d.file === file);
            const cPts = makePoints(series, "mean_certainty");
            const aPts = makePoints(series, "mean_autonomy");
            const col = colors[fi % colors.length];
            return <g key={file}>
              {cPts.length > 1 && <path d={toPath(cPts)} stroke={col} strokeWidth={1.5} fill="none"/>}
              {aPts.length > 1 && <path d={toPath(aPts)} stroke={col} strokeWidth={1.5} fill="none" strokeDasharray="4 3"/>}
              {cPts.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r={3} fill={col}/>)}
            </g>;
          })}

          <text x={padL} y={H-8} fill="#5a5850" fontSize={9}>older →</text>
          <text x={W-padR} y={H-8} textAnchor="end" fill="#5a5850" fontSize={9}>newer</text>
        </svg>
        <div style={{fontSize:10,color:"#5a5850",marginTop:8,fontFamily:"'DM Mono',monospace"}}>
          — solid: certainty &nbsp;&nbsp; - - dashed: autonomy &nbsp;&nbsp;
          {files.map((f,i) => <span key={f} style={{color:colors[i%colors.length],marginRight:12}}>{f.split("/").pop()}</span>)}
        </div>
      </div>
    </div>
  );
}

// ─── LOC Chart ───────────────────────────────────────────────────────────
function LocChart() {
  const snapshots = CONCEPTS_DATA.sankey_snapshots || [];
  if (!snapshots.length) return <div style={{color:"var(--text-dim)"}}>No LOC data.</div>;

  const ERA_COLORS = ["#2970d6","#16a34a","#7c5ce0","#d94f2a","#5a5850"];
  const rows = snapshots.map(s => ({
    label: `${s.hash_short} ${s.date}`,
    message: s.message,
    loc: (s.nodes || []).reduce((sum, n) => sum + (n.loc||0), 0),
    era: s.era,
    eraIdx: parseInt((s.era || "era-0").replace("era-",""), 10) || 0,
  }));
  const maxLoc = Math.max(...rows.map(r => r.loc), 1);

  return (
    <div className="loc-bars">
      {rows.map((row, i) => {
        const col = ERA_COLORS[row.eraIdx % ERA_COLORS.length];
        return (
          <div key={i} className="loc-row" title={row.message}>
            <span className="loc-label">{row.label}</span>
            <div className="loc-bar-wrap">
              <div className="loc-bar" style={{
                width: `${(row.loc/maxLoc)*100}%`,
                background: col + "18",
                border: `1px solid ${col}55`,
              }}/>
            </div>
            <span className="loc-value">{row.loc}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState("grid");
  const tabs = [
    { id: "grid",  label: "Concept Grid" },
    { id: "lang",  label: "Exact Language" },
    { id: "sent",  label: "Sentiment Arc" },
    { id: "loc",   label: "LOC Evolution" },
  ];

  return (
    <div id="root">
      <div className="header">
        <span className="header-title">Fossil Record — Prompt Archaeology</span>
        <span className="header-meta">
          {CONCEPTS_DATA.concept_ids?.length || 0} concepts · {CONCEPTS_DATA.sankey_snapshots?.length || 0} commits · {CONCEPTS_DATA.eras?.join(", ")}
        </span>
      </div>
      <div className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={`tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>
      <div className="panel">
        {tab === "grid" && <ConceptGrid />}
        {tab === "lang" && <ExactLanguage />}
        {tab === "sent" && <SentimentArc />}
        {tab === "loc"  && <LocChart />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>

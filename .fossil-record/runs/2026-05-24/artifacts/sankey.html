<style>
  :root {
    --bg:           #f9f8f6;
    --bg2:          #f2f1ee;
    --bg3:          #eae9e5;
    --border:       #dddbd6;
    --border-light: #e8e6e1;
    --text:         #0a0a09;
    --text-muted:   #111110;
    --text-dim:     #5a5850;
    --accent:       #16a34a;
    --accent-blue:  #2970d6;
    --accent-purple:#7c5ce0;
    --accent-orange:#d94f2a;
    --font-sans:    'Barlow', sans-serif;
    --font-cond:    'Barlow Condensed', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --radius:       4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #root { display: flex; flex-direction: column; height: 100%; }

  /* ── Header ── */
  .header {
    height: 56px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-title {
    font-family: var(--font-cond);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .header-divider {
    width: 1px;
    height: 16px;
    background: var(--border);
  }
  .header-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
  }
  .nav-link {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text-dim);
    border: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .nav-link:hover { color: var(--text); background: var(--bg3); }
  .nav-link.active {
    color: var(--accent);
    border-color: rgba(22,163,74,0.3);
    background: rgba(22,163,74,0.06);
  }
  .era-chip {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: var(--radius);
    background: var(--bg3);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .era-chip.pivot {
    background: rgba(217,79,42,0.08);
    color: var(--accent-orange);
    border-color: rgba(217,79,42,0.2);
  }
  .state-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  .canvas-wrap {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background: var(--bg);
    padding: 32px;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 288px;
    border-left: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .commit-panel {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .commit-hash {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent-blue);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .commit-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .commit-msg {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.5;
  }

  .concept-list {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }
  .concept-list-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .concept-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border-light);
    gap: 8px;
  }
  .concept-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .state-pill {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: var(--radius);
    flex-shrink: 0;
  }

  /* ── Stepper ── */
  .stepper {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .stepper-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .stepper-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    transition: border-color 0.15s, color 0.15s;
  }
  .stepper-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .stepper-btn:disabled { opacity: 0.35; cursor: default; }
  .stepper-pos {
    flex: 1;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    height: 2px;
  }

  /* ── Presenter overlay ── */
  .presenter-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
    padding-bottom: 48px;
    z-index: 10;
  }
  .presenter-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 32px;
    max-width: 560px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(10,10,9,0.08);
  }
  .presenter-hash {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent-blue);
    margin-bottom: 6px;
  }
  .presenter-msg {
    font-family: var(--font-cond);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .presenter-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 10px;
  }
</style>

// ── SVG Sankey ──────────────────────────────────────────────────────────────
function SankeyCanvas({ snapshot }) {
  if (!snapshot || !snapshot.nodes || !snapshot.nodes.length) {
    return (
      <div style={{textAlign:"center", color:"var(--text-dim)", fontFamily:"var(--font-mono)", fontSize:11, padding:40}}>
        No concepts changed this commit.
      </div>
    );
  }

  const nodes = snapshot.nodes;
  const links = snapshot.links || [];
  const summary = snapshot.concept_summary || {};

  const W = 680, nodeW = 148, nodeH = 36, padY = 10;
  const dying = new Set(Object.entries(summary).filter(([,s]) => s === "DIED").map(([id]) => id));
  const alive = nodes.filter(n => !dying.has(n.id));
  const dead  = nodes.filter(n =>  dying.has(n.id));
  const rowCount = Math.max(alive.length, dead.length, 1);
  const H = Math.max(240, rowCount * (nodeH + padY) + 80);
  const col0X = 32, col1X = W - nodeW - 32;

  const layout = {};
  alive.forEach((n, i) => {
    const state = summary[n.id] || "STABLE";
    layout[n.id] = { x: col1X, y: 40 + i * (nodeH + padY), w: nodeW, h: nodeH,
      lc: LC[state] || LC.STABLE, label: n.label || n.id };
  });
  dead.forEach((n, i) => {
    layout[n.id] = { x: col0X, y: 40 + i * (nodeH + padY), w: nodeW, h: nodeH,
      lc: LC.DIED, label: n.label || n.id };
  });

  const linkPaths = links.map((link, i) => {
    const src = layout[link.source];
    if (!src) return null;
    const sx = src.x + src.w, sy = src.y + src.h / 2;
    if (link.target === "∅" || !layout[link.target]) {
      const ex = W - 8, ey = H / 2;
      const cx = (sx + ex) / 2;
      return <path key={i} d={`M${sx},${sy} C${cx},${sy} ${cx},${ey} ${ex},${ey}`}
        stroke="rgba(217,79,42,0.3)" strokeWidth={1.5} fill="none" strokeDasharray="4 3" />;
    }
    const tgt = layout[link.target];
    const ex = tgt.x, ey = tgt.y + tgt.h / 2;
    const cx = (sx + ex) / 2;
    return <path key={i} d={`M${sx},${sy} C${cx},${sy} ${cx},${ey} ${ex},${ey}`}
      stroke="rgba(41,112,214,0.25)" strokeWidth={1.5} fill="none" />;
  });

  return (
    <svg width={W} height={H} style={{display:"block"}}>
      {/* column rule */}
      <line x1={col0X+nodeW+16} y1={16} x2={col0X+nodeW+16} y2={H-16}
        stroke="#dddbd6" strokeWidth={1} strokeDasharray="2 4" />
      <line x1={col1X-16} y1={16} x2={col1X-16} y2={H-16}
        stroke="#dddbd6" strokeWidth={1} strokeDasharray="2 4" />

      {linkPaths}

      {/* nodes */}
      {Object.values(layout).map((n, i) => (
        <g key={i} transform={`translate(${n.x},${n.y})`}>
          <rect width={n.w} height={n.h} rx={4}
            fill={n.lc.bg} stroke={n.lc.border} strokeWidth={1} />
          <text x={n.w/2} y={n.h/2+4} textAnchor="middle"
            fill={n.lc.text} fontSize={10}
            fontFamily="'DM Mono', monospace" fontWeight={500}>
            {n.label.length > 18 ? n.label.slice(0,17) + "…" : n.label}
          </text>
        </g>
      ))}

      {/* ∅ sink */}
      {dying.size > 0 && (
        <g transform={`translate(${W-20},${H/2-18})`}>
          <rect width={20} height={36} rx={4}
            fill="rgba(217,79,42,0.08)" stroke="rgba(217,79,42,0.25)" strokeWidth={1} />
          <text x={10} y={22} textAnchor="middle" fill="#d94f2a" fontSize={13}
            fontFamily="'Barlow Condensed', sans-serif" fontWeight={600}>∅</text>
        </g>
      )}

      {/* column labels */}
      <text x={col0X} y={20} fill="#5a5850" fontSize={9}
        fontFamily="'DM Mono', monospace" letterSpacing={2} textTransform="uppercase">DYING</text>
      <text x={col1X} y={20} fill="#5a5850" fontSize={9}
        fontFamily="'DM Mono', monospace" letterSpacing={2} textTransform="uppercase">ALIVE</text>
    </svg>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const demo = isDemoMode();
  const [idx, setIdx] = React.useState(0);
  const snap = SNAPSHOTS[idx] || null;
  const isPivot = snap && PIVOT_COMMITS.includes(snap.hash_short);

  React.useEffect(() => {
    if (!demo) return;
    const onKey = e => {
      if (e.key === "ArrowRight") setIdx(i => Math.min(i+1, SNAPSHOTS.length-1));
      if (e.key === "ArrowLeft")  setIdx(i => Math.max(i-1, 0));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [demo]);

  const stateCounts = snap
    ? Object.values(snap.concept_summary || {}).reduce((acc, s) => {
        acc[s] = (acc[s]||0)+1; return acc;
      }, {})
    : {};

  return (
    <div id="root">
      <div className="header">
        <span className="header-title">Fossil Record</span>
        <div className="header-divider" />
        {snap && (
          <span className={`era-chip${isPivot ? " pivot" : ""}`}>
            {isPivot ? "⚡ " : ""}{snap.era}
          </span>
        )}
        {Object.entries(stateCounts).map(([s,n]) => (
          <span key={s} className="state-count" style={{color: lcColor(s)}}>
            {n} {s.toLowerCase()}
          </span>
        ))}
        <nav className="header-nav">
          <a href="sankey.html" className="nav-link active">Sankey</a>
          <a href="prompt-diff.html" className="nav-link">Archaeology</a>
        </nav>
      </div>

      <div className="main">
        <div className="canvas-wrap">
          <SankeyCanvas snapshot={snap} />
        </div>

        <div className="sidebar">
          <div className="commit-panel">
            {snap ? (<>
              <div className="commit-hash">{snap.hash_short} · {idx+1}/{SNAPSHOTS.length}</div>
              <div className="commit-date">{snap.date}</div>
              <div className="commit-msg">{snap.message}</div>
            </>) : <div className="commit-msg" style={{color:"var(--text-dim)"}}>No snapshots.</div>}
          </div>

          <div className="concept-list">
            <div className="concept-list-label">This commit</div>
            {snap && Object.entries(snap.concept_summary || {}).map(([id, state]) => {
              const lc = LC[state] || LC.STABLE;
              return (
                <div key={id} className="concept-row">
                  <span className="concept-name">{id}</span>
                  <span className="state-pill" style={{background:lc.bg, color:lc.text}}>{state}</span>
                </div>
              );
            })}
          </div>

          {!demo && (
            <div className="stepper">
              <div className="stepper-controls">
                <button className="stepper-btn" onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0}>‹ prev</button>
                <span className="stepper-pos">{idx+1} / {SNAPSHOTS.length}</span>
                <button className="stepper-btn" onClick={()=>setIdx(i=>Math.min(i+1,SNAPSHOTS.length-1))} disabled={idx===SNAPSHOTS.length-1}>next ›</button>
              </div>
              <input type="range" min={0} max={SNAPSHOTS.length-1} value={idx}
                onChange={e=>setIdx(Number(e.target.value))} />
            </div>
          )}
        </div>
      </div>

      {demo && snap && (
        <div className="presenter-overlay">
          <div className="presenter-card">
            <div className="presenter-hash">{snap.hash_short} · {snap.date} · {snap.era}</div>
            <div className="presenter-msg">{snap.message}</div>
            <div className="presenter-hint">← → to navigate · {idx+1}/{SNAPSHOTS.length}</div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>

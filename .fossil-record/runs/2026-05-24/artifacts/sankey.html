  .stepper-label { flex: 1; text-align: center; color: #8b949e; font-size: 11px; }
  input[type=range] { width: 100%; accent-color: #58a6ff; }
  .presenter-overlay {

const ERAS = ["era-0"];
const PIVOT_COMMITS = [];

const LC_COLOR = {
  BORN:   "#22c55e",
  STABLE: "#64748b",
  MORPHED:"#f59e0b",
  SPLIT:  "#60a5fa",
  MERGED: "#60a5fa",
  DIED:   "#ef4444",
};

function isDemoMode() {
  return new URLSearchParams(window.location.search).get("demo") === "1";
}

// ─── SVG Sankey layout ───────────────────────────────────────────────────
function SankeyCanvas({ snapshot }) {
  if (!snapshot || !snapshot.nodes) return <svg width={600} height={300} />;
  const nodes = snapshot.nodes;
  const links = snapshot.links || [];
  const summary = snapshot.concept_summary || {};

  const W = 640, nodeW = 130, nodeH = 34, padY = 14;
  const dying = new Set(Object.entries(summary).filter(([,s]) => s === "DIED").map(([id]) => id));
  const alive = nodes.filter(n => !dying.has(n.id));
  const dead  = nodes.filter(n =>  dying.has(n.id));
  const H = Math.max(220, (Math.max(alive.length, dead.length) * (nodeH + padY)) + 80);

  const col0X = 40, col1X = W - nodeW - 40;
  const layout = {};
  alive.forEach((n, i) => {
    layout[n.id] = { x: col1X, y: 40 + i * (nodeH + padY), w: nodeW, h: nodeH,
      color: LC_COLOR[n.fate === "green" ? "BORN" : n.fate === "red" ? "DIED" : n.fate === "amber" ? "MORPHED" : "STABLE"],
      label: n.label || n.id };
  });
  dead.forEach((n, i) => {
    layout[n.id] = { x: col0X, y: 40 + i * (nodeH + padY), w: nodeW, h: nodeH,
      color: "#ef4444", label: n.label || n.id };
  });

  const linkPaths = links.map((link, i) => {
    const src = layout[link.source];
    if (!src) return null;
    const sx = src.x + src.w, sy = src.y + src.h / 2;
    if (link.target === "∅" || !layout[link.target]) {
      const ex = W - 16, ey = H / 2;
      const cx = (sx + ex) / 2;
      return <path key={i}
        d={`M${sx},${sy} C${cx},${sy} ${cx},${ey} ${ex},${ey}`}
        stroke="#ef444466" strokeWidth="2" fill="none" strokeDasharray="4 3" />;
    }
    const tgt = layout[link.target];
    const ex = tgt.x, ey = tgt.y + tgt.h / 2;
    const cx = (sx + ex) / 2;
    return <path key={i}
      d={`M${sx},${sy} C${cx},${sy} ${cx},${ey} ${ex},${ey}`}
      stroke="#58a6ff44" strokeWidth="2" fill="none" />;
  });

  return (
    <svg width={W} height={H} style={{display:"block"}}>
      <line x1={col0X+nodeW} y1={0} x2={col0X+nodeW} y2={H} stroke="#1e2a38" strokeWidth={1}/>
      <line x1={col1X} y1={0} x2={col1X} y2={H} stroke="#1e2a38" strokeWidth={1}/>
      {linkPaths}
      {Object.values(layout).map((n, i) => (
        <g key={i} transform={`translate(${n.x},${n.y})`}>
          <rect width={n.w} height={n.h} rx={4}
            fill={n.color + "22"} stroke={n.color} strokeWidth={1.5}/>
          <text x={n.w/2} y={n.h/2+4} textAnchor="middle"
            fill={n.color} fontSize={10} fontFamily="monospace">{n.label}</text>
        </g>
      ))}
      {dying.size > 0 && (
        <g transform={`translate(${W-22},${H/2-16})`}>
          <rect width={22} height={32} rx={4} fill="#ef444422" stroke="#ef4444" strokeWidth={1.5}/>
          <text x={11} y={20} textAnchor="middle" fill="#ef4444" fontSize={13}>∅</text>
        </g>
      )}
      <text x={col0X} y={22} fill="#4a5568" fontSize={10}>dying</text>
      <text x={col1X} y={22} fill="#4a5568" fontSize={10}>alive</text>
    </svg>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────
function App() {
  const demo = isDemoMode();
  const [idx, setIdx] = React.useState(0);
  const snap = SNAPSHOTS[idx] || null;
  const isPivot = snap && PIVOT_COMMITS.includes(snap.hash_short);

  React.useEffect(() => {
    if (!demo) return;
    const onKey = e => {
      if (e.key === "ArrowRight") setIdx(i => Math.min(i+1, SNAPSHOTS.length-1));
      if (e.key === "ArrowLeft")  setIdx(i => Math.max(i-1, 0));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [demo]);

  const stateCounts = snap
    ? Object.values(snap.concept_summary || {}).reduce((acc, s) => {
        acc[s] = (acc[s]||0)+1; return acc;
      }, {})
    : {};

  return (
    <div id="root">
      <div className="header">
        <h1>Fossil Record — Sankey</h1>
        {snap && <span className={`era-badge${isPivot ? " pivot" : ""}`}>
          {isPivot ? "⚡ pivot · " : ""}{snap.era}
        </span>}
        {Object.entries(stateCounts).map(([s,n]) => (
          <span key={s} style={{fontSize:"10px", color:LC_COLOR[s]||"#8b949e"}}>
            {n} {s.toLowerCase()}
          </span>
        ))}
      </div>

      <div className="main">
        <div className="canvas-wrap">
          <SankeyCanvas snapshot={snap} />
        </div>

        <div className="sidebar">
          <div className="commit-panel">
            {snap ? (<>
              <div className="chash">{snap.hash_short} · {idx+1}/{SNAPSHOTS.length}</div>
              <div className="cdate">{snap.date}</div>
              <div className="cmsg">{snap.message}</div>
            </>) : <div className="cmsg">No snapshots loaded.</div>}
          </div>

          <div className="concept-list">
            <h3>This commit</h3>
            {snap && Object.entries(snap.concept_summary || {}).map(([id, state]) => (
              <div key={id} className="concept-row">
                <span className="concept-name">{id}</span>
                <span className="state-badge" style={{
                  background: (LC_COLOR[state]||"#64748b")+"22",
                  color: LC_COLOR[state]||"#64748b"
                }}>{state}</span>
              </div>
            ))}
          </div>

          {!demo && (
            <div className="stepper">
              <div className="stepper-controls">
                <button onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0}>‹ prev</button>
                <span className="stepper-label">{idx+1} / {SNAPSHOTS.length}</span>
                <button onClick={()=>setIdx(i=>Math.min(i+1,SNAPSHOTS.length-1))} disabled={idx===SNAPSHOTS.length-1}>next ›</button>
              </div>
              <input type="range" min={0} max={SNAPSHOTS.length-1} value={idx}
                onChange={e=>setIdx(Number(e.target.value))}/>
            </div>
          )}
        </div>
      </div>

      {demo && snap && (
        <div className="presenter-overlay">
          <div className="presenter-card">
            <div className="phash">{snap.hash_short} · {snap.date} · {snap.era}</div>
            <div className="pmsg">{snap.message}</div>
            <div className="hint">← → to navigate · {idx+1}/{SNAPSHOTS.length}</div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

        synthesis:
          - "Intellia Therapeutics' in vivo CRISPR therapy became the first of its kind to succeed in a Phase 3 trial — treating hereditary angioedema (HAE), a genetic disease causing unpredictable and potentially fatal swelling attacks."
          - "The one-time infusion, which edits genes directly inside the body, reduced swelling attacks by 87% compared to placebo — a clinically substantial efficacy signal for a disease with severe quality-of-life and safety consequences."

          - "The 'skepticism growing' signal is worth tracking: CRISPR's original promise may be narrowing in practice to specific rare monogenic conditions — a still-important but more limited scope than initially envisioned."
          - "In vivo vs. ex vivo is the key strategic distinction — in vivo is harder and riskier but more scalable and broadly applicable; this Phase 3 result advances the more ambitious branch."

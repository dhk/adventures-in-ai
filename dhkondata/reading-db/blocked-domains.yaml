# reading-db blocked domains config
# version: 1.0
# Maintained separately from the skill so it can be updated independently.
# Bump the version when adding or removing domains.
# The skill reads this file at runtime — do not inline this list in SKILL.md.
#
# Categories:
#   esp       — email service provider redirect/tracking wrappers
#   tracker   — pixel trackers and analytics links
#   social    — social media profile/share links (not editorial)
#   utility   — unsubscribe, preferences, view-in-browser links (caught by anchor text rules too)
#
# To add a domain: add an entry under the appropriate category with a note.
# To flag a domain for review: add a `review: true` field and a reason.

version: "1.0"

blocked:

  esp:
    - domain: links.tldrnewsletter.com
      note: TLDR redirect wrapper — resolve through to canonical
    - domain: mailchi.mp
      note: Mailchimp redirect wrapper
    - domain: mg.mail.substack.com
      note: Substack email gateway — resolve through
    - domain: link.axios.com
      note: Axios email redirect wrapper
    - domain: click.e.washingtonpost.com
      note: Washington Post email redirect wrapper
    - domain: email.mg.substack.com
      note: Substack email gateway (alternate)
    - domain: mandrillapp.com
      note: Mandrill/Mailchimp transactional wrapper
    - domain: sendgrid.net
      note: SendGrid redirect wrapper
    - domain: mailgun.org
      note: Mailgun redirect wrapper
    - domain: list-manage.com
      note: Mailchimp list management redirect
    - domain: campaign-archive.com
      note: Mailchimp archive links
    - domain: constantcontact.com
      note: Constant Contact redirect wrapper
    - domain: hubspotemail.net
      note: HubSpot email redirect wrapper
    - domain: email.mg2.substack.com
      note: Substack email gateway (v2)
    - domain: substack.com
      note: Substack email wrapper root — resolve to specific post URLs
      review: true
      reason: Some substack.com/p/ links ARE editorial — only block root/tracking paths

  tracker:
    - domain: open.convertkit-mail.com
      note: ConvertKit open tracker
    - domain: track.customer.io
      note: Customer.io click tracker
    - domain: click.convertkit-mail.com
      note: ConvertKit click tracker
    - domain: link.mail.beehiiv.com
      note: Beehiiv email redirect wrapper
    - domain: email.mg.washingtonpost.com
      note: Washington Post email tracker

  social:
    - domain: twitter.com
      note: Social — not editorial
    - domain: x.com
      note: Social — not editorial
    - domain: linkedin.com
      note: Social — not editorial
    - domain: facebook.com
      note: Social — not editorial
    - domain: instagram.com
      note: Social — not editorial
    - domain: youtube.com
      note: Social — not editorial (unless the article IS a video, handle separately)
    - domain: threads.net
      note: Social — not editorial

# Suspicious patterns (anchor text-based, not domain-based)
# These are applied as substring matches against anchor text (case-insensitive).
# Maintained here alongside domain blocks for unified review.

suspicious_anchor_patterns:
  - pattern: unsubscribe
    reason: Footer utility link
  - pattern: manage preferences
    reason: Footer utility link
  - pattern: view in browser
    reason: Footer utility link
  - pattern: view online
    reason: Footer utility link
  - pattern: privacy policy
    reason: Legal boilerplate
  - pattern: terms of service
    reason: Legal boilerplate
  - pattern: click here
    reason: Generic CTA — no editorial signal
  - pattern: read more
    reason: Generic CTA — no editorial signal
  - pattern: learn more
    reason: Generic CTA — no editorial signal
  - pattern: subscribe
    reason: Usually a subscription CTA, not an article link
  - pattern: forward to a friend
    reason: Email utility
  - pattern: share this
    reason: Social share utility
  - pattern: tweet this
    reason: Social share utility
  - pattern: advertise
    reason: Commercial link
  - pattern: sponsor
    reason: Commercial link

# Domains under observation — not blocked yet but flagged for monitoring
# After 2 weeks of data, review fetch_status and parse_confidence to decide.

watch:
  - domain: theatlantic.com
    reason: Suspected hard paywall — monitoring fetch_status
  - domain: theinformation.com
    reason: Known hard paywall — likely always fetch_failed
  - domain: wsj.com
    reason: Known hard paywall
  - domain: nytimes.com
    reason: Known metered paywall
  - domain: washingtonpost.com
    reason: Known metered paywall
  - domain: thedispatch.com
    reason: Suspected soft paywall for non-subscribers

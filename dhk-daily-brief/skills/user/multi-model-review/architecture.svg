<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- YOU -->
  <rect x="260" y="20" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">You</text>

  <!-- Arrow down to Claude -->
  <line x1="340" y1="64" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="90" dominant-baseline="central" font-size="12" fill="#5F5E5A">proposal or draft</text>

  <!-- CLAUDE ORCHESTRATOR -->
  <rect x="180" y="108" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Claude</text>
  <text x="340" y="150" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">orchestrator — reviews independently first</text>

  <!-- Arrow left to Claude review -->
  <path d="M180 148 L80 148" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M80 148 L80 210" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- CLAUDE REVIEW -->
  <rect x="20" y="210" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="110" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Claude's review</text>
  <text x="110" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">findings, severity, framing</text>

  <!-- Arrow right to MCP -->
  <path d="M500 136 L500 130 L570 130 L570 152" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="510" y="122" font-size="12" fill="#5F5E5A">MCP call</text>

  <!-- MCP SERVER -->
  <rect x="480" y="108" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="570" y="130" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">MCP server</text>

  <!-- Arrow from MCP down to Codex -->
  <line x1="570" y1="152" x2="570" y2="210" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- CODEX -->
  <rect x="480" y="210" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="570" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Codex</text>
  <text x="570" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">independent critique</text>

  <!-- Both converge into synthesis -->
  <path d="M110 266 L110 360 L220 360" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M570 266 L570 360 L460 360" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- SYNTHESIS -->
  <rect x="220" y="332" width="240" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="354" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Synthesis</text>
  <text x="340" y="374" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">consensus · divergence · crux</text>

  <!-- Arrow down to output -->
  <line x1="340" y1="388" x2="340" y2="432" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT -->
  <rect x="200" y="432" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="454" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Structured output</text>
  <text x="340" y="474" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Claude · Codex · divergent findings</text>

  <!-- Footer -->
  <text x="340" y="510" text-anchor="middle" font-size="11" fill="#888780">the value is in the divergence</text>
</svg>
